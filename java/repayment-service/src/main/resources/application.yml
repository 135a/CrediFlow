server:
  port: 8085
spring:
  application:
    name: repayment-service

  flyway:
    enabled: true
    table: flyway_history_
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:crediflow}?useSSL=false&characterEncoding=utf8&serverTimezone=UTC
    username: ${MYSQL_USER:crediflow}
    password: ${MYSQL_PASSWORD:crediflow}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

# Redisson config - no password (Redis in Docker has no auth)
redisson:
  single-server-config:
    address: redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:rmqnamesrv:9876}
  producer:
    group: repayment-service-producer

crediflow:
  repayment:
    # 主动还款是否经 Go fund-channel-gateway 受理（默认 true，禁止 Java 直连资金方）。
    use-gateway: ${REPAYMENT_USE_GATEWAY:true}
    # 业务侧默认资金方 ID；留空 => 由网关回落到 Nacos defaultProviderId（混合路由）。
    default-provider-id: ${REPAYMENT_DEFAULT_PROVIDER_ID:}

fund:
  channel:
    gateway:
      url: ${FUND_CHANNEL_GATEWAY_URL:http://fund-channel-gateway:8090}

