global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'crediflow-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: 
        - 'host.docker.internal:8080' # user-service
        - 'host.docker.internal:8081' # system-service
        - 'host.docker.internal:8082' # credit-risk-service
        - 'host.docker.internal:8083' # loan-application-service
        - 'host.docker.internal:8084' # loan-contract-service
        - 'host.docker.internal:8085' # repayment-service
        - 'host.docker.internal:8086' # post-loan-service
        - 'host.docker.internal:8087' # fund-flow-service
