deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    allow_admin:
      - 0.0.0.0/0
    admin_listen:
      ip: 0.0.0.0
      port: 9180
  etcd:
    host:
      - "http://etcd-apisix:2379"
    prefix: "/apisix"
    timeout: 30
apisix:
  node_listen: 9080
  enable_ipv6: false
