apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_admin: true
  admin_key:
    - name: admin
      key: edd1c9f034335f136f87ad84b625c8f1
      role: admin

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  etcd:
    host:
      - "http://etcd-apisix:2379"
    prefix: "/apisix"
    timeout: 30

nginx_config:
  error_log: /usr/local/apisix/logs/error.log
  error_log_level: warn
