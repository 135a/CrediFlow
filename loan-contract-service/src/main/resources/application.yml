server:
  port: 8084
spring:
  application:
    name: loan-contract-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

crediflow:
  contract:
    # 默认日化贷款利率为万分之三，支持从环境变量或 Nacos 动态注入
    interest-rate: ${INTEREST_RATE:0.0003}
