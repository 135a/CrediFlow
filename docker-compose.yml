networks:
  internal:
    driver: bridge

volumes:
  mysql-data: {}
  apisix-logs: {}

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: crediflow
      MYSQL_USER: crediflow
      MYSQL_PASSWORD: crediflow
      MYSQL_ROOT_PASSWORD: rootpass
      NACOS_DB: nacos_config
      NACOS_USER: nacos
      NACOS_PASSWORD: nacos
    networks: [internal]
    volumes:
      - mysql-data:/var/lib/mysql
      # 顺序按文件名字典序执行：01-bootstrap-nacos.sh 建库建账号，再导入 02-nacos-schema.sql。
      - ./infra/mysql/init/01-bootstrap-nacos.sh:/docker-entrypoint-initdb.d/01-bootstrap-nacos.sh:ro
      - ./infra/nacos/mysql-schema.sql:/docker-entrypoint-initdb.d/02-nacos-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucrediflow", "-pcrediflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.0
    environment:
      MODE: standalone
      # 强制走 MySQL 持久化存储，禁用嵌入式 Derby —— 配置不再随容器销毁。
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: "3306"
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: nacos
      MYSQL_SERVICE_DB_PARAM: "characterEncoding=utf8&connectTimeout=2000&socketTimeout=5000&autoReconnect=true&useSSL=false&serverTimezone=UTC"
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: "256m"
      JVM_XMX: "256m"
      JVM_XMN: "128m"
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 15

  rmqnamesrv:
    image: apache/rocketmq:5.2.0
    networks: [internal]
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m -Xmn128m"
    command: sh mqnamesrv

  rmqbroker:
    image: apache/rocketmq:5.2.0
    networks: [internal]
    depends_on:
      - rmqnamesrv
    environment:
      NAMESRV_ADDR: rmqnamesrv:9876
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    command: sh mqbroker -n rmqnamesrv:9876 autoCreateTopicEnable=true

  milvus:
    image: milvusdb/milvus:v2.3.10
    networks: [internal]
    command: ["milvus", "run", "standalone"]

  etcd-apisix:
    image: quay.io/coreos/etcd:v3.5.12
    networks: [internal]
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd-apisix:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379

  apisix:
    image: apache/apisix:3.9.0-debian
    depends_on:
      - etcd-apisix
    networks: [internal]
    ports:
      - "9080:9080"
      - "9180:9180"
    volumes:
      - ./infra/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - apisix-logs:/usr/local/apisix/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9080/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s

  # 在 APISIX 就绪后，将仓库内声明式 JSON 经 Admin API 写入 etcd（本地开发；勿与 Dashboard 手改混用）
  apisix-init:
    image: curlimages/curl:8.5.0
    networks: [internal]
    depends_on:
      apisix:
        condition: service_healthy
    environment:
      APISIX_ADMIN: http://apisix:9180
      ADMIN_KEY: crediflow-local-apisix-admin-key-demo
    volumes:
      - ./infra/apisix/scripts/sync-routes.sh:/scripts/sync-routes.sh:ro
      - ./infra/apisix/conf.d:/conf.d:ro
    entrypoint: ["sh", "/scripts/sync-routes.sh"]
    restart: "no"

  user-service:
    build:
      context: ./user/user-service
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  credit-risk-service:
    build:
      context: ./credit/credit-risk-service
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  loan-application-service:
    build:
      context: ./loan/loan-application-service
    networks: [internal]
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  loan-contract-service:
    build:
      context: ./contract/loan-contract-service
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  repayment-service:
    build:
      context: ./fund/repayment-service
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  post-loan-service:
    build:
      context: ./post-loan/post-loan-service
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  fund-flow-service:
    build:
      context: ./fund/fund-flow-service
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      fund-channel-gateway:
        condition: service_started

  admin-bff-service:
    build:
      context: ./bff/admin-bff-service
    networks: [internal]
    depends_on:
      nacos:
        condition: service_healthy

  app-bff-service:
    build:
      context: ./bff/app-bff-service
    networks: [internal]
    depends_on:
      nacos:
        condition: service_healthy

  system-service:
    build:
      context: ./system/system-service
    networks: [internal]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  batch-service:
    build:
      context: ./batch/batch-service
    networks: [internal]
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  fund-channel-gateway:
    build:
      context: ./fund/fund-channel-gateway
    networks: [internal]
    env_file:
      - .env
    environment:
      FUND_GATEWAY_CONFIG_PATH: /app/configs/fund-provider.dev.yaml
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  data-agent:
    build:
      context: ./credit/data-agent
    networks: [internal]
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      milvus:
        condition: service_started
